$schema: "https://moonrepo.dev/schemas/project.json"

tasks:
  check:
    command: 'cargo check -p vo-ipc'
    toolchains:
      - rust
    options:
      runInCI: true

  fmt:
    command: 'cargo fmt -p vo-ipc -- --check'
    toolchains:
      - rust
    options:
      runInCI: true

  lint-src:
    command: 'cargo clippy -p vo-ipc --lib --bins --examples -- -D warnings -W clippy::all'
    toolchains:
      - rust
    options:
      runInCI: true

  test:
    command: 'cargo test -p vo-ipc'
    toolchains:
      - rust
    options:
      runInCI: true
